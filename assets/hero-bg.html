<script>
(function() {
  const canvas = document.getElementById('huntbg');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  class Ember {
    constructor() { this.reset(true); }
    reset(init=false) {
      this.x = Math.random()*W; this.y = init ? Math.random()*H : H+10;
      this.size = Math.random()*2.8+0.4; this.speedY = -(Math.random()*1.2+0.3);
      this.speedX = (Math.random()-0.5)*0.6; this.life = 1;
      this.decay = Math.random()*0.004+0.001; this.hue = Math.random()*40+15;
      this.twinkle = Math.random()*Math.PI*2; this.twinkleSpeed = Math.random()*0.05+0.01;
    }
    update() {
      this.x += this.speedX+Math.sin(this.twinkle)*0.3; this.y += this.speedY;
      this.life -= this.decay; this.twinkle += this.twinkleSpeed;
      if (this.life<=0||this.y<-10) this.reset();
    }
    draw() {
      const a = this.life*(0.6+0.4*Math.sin(this.twinkle));
      ctx.save(); ctx.globalAlpha = Math.max(0,a);
      const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*2.5);
      g.addColorStop(0,`hsl(${this.hue},100%,90%)`); g.addColorStop(0.4,`hsl(${this.hue},100%,60%)`); g.addColorStop(1,`hsla(${this.hue},100%,40%,0)`);
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(this.x,this.y,this.size*2.5,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
  }

  class Wisp {
    constructor() { this.reset(true); }
    reset(init=false) {
      this.x=Math.random()*W; this.y=init?Math.random()*H:H*0.85+Math.random()*H*0.15;
      this.r=Math.random()*80+40; this.speedY=-(Math.random()*0.4+0.1);
      this.speedX=(Math.random()-0.5)*0.2; this.life=Math.random()*0.3+0.05;
      this.decay=Math.random()*0.0008+0.0003; this.rot=Math.random()*Math.PI*2;
      this.rotSpeed=(Math.random()-0.5)*0.003;
    }
    update() {
      this.x+=this.speedX; this.y+=this.speedY; this.r+=0.3;
      this.life-=this.decay; this.rot+=this.rotSpeed;
      if(this.life<=0||this.y<-this.r) this.reset();
    }
    draw() {
      ctx.save(); ctx.globalAlpha=Math.max(0,this.life*0.4);
      ctx.translate(this.x,this.y); ctx.rotate(this.rot);
      const g=ctx.createRadialGradient(0,0,0,0,0,this.r);
      g.addColorStop(0,'rgba(60,30,10,0.5)'); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.ellipse(0,0,this.r,this.r*0.6,0,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
  }

  function drawHorizon(t) {
    const b=0.7+0.3*Math.sin(t*0.001);
    const g=ctx.createRadialGradient(W/2,H*0.72,0,W/2,H*0.72,W*0.7);
    g.addColorStop(0,`rgba(200,60,0,${0.22*b})`); g.addColorStop(0.4,`rgba(120,20,0,${0.12*b})`); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.save(); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.restore();
  }
  function drawGrid(t) {
    const p=0.03+0.015*Math.sin(t*0.0008);
    ctx.save(); ctx.strokeStyle=`rgba(255,90,0,${p})`; ctx.lineWidth=0.5;
    for(let i=0;i<=12;i++){ctx.beginPath();ctx.moveTo(i*W/12,0);ctx.lineTo(i*W/12,H);ctx.stroke();}
    for(let j=0;j<=8;j++){ctx.beginPath();ctx.moveTo(0,j*H/8);ctx.lineTo(W,j*H/8);ctx.stroke();}
    ctx.restore();
  }
  let scanY=0;
  function drawScan() {
    scanY=(scanY+0.6)%H; ctx.save(); ctx.globalAlpha=0.04;
    const g=ctx.createLinearGradient(0,scanY-60,0,scanY+60);
    g.addColorStop(0,'transparent'); g.addColorStop(0.5,'rgba(255,120,0,0.8)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,scanY-60,W,120); ctx.restore();
  }
  function drawVignette() {
    const g=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.82)');
    ctx.save(); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.restore();
  }

  const embers=Array.from({length:280},()=>new Ember());
  const wisps=Array.from({length:12},()=>new Wisp());
  let t=0;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  (function loop() {
    requestAnimationFrame(loop); t++;
    ctx.fillStyle='rgba(4,2,1,0.38)'; ctx.fillRect(0,0,W,H);
    drawHorizon(t); drawGrid(t);
    wisps.forEach(w=>{w.update();w.draw();});
    embers.forEach(e=>{e.update();e.draw();});
    drawScan(); drawVignette();
  })();
})();
</script>
